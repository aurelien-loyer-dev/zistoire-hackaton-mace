services:
  # ── PostgreSQL Database ──────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./admin/db/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./admin/db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Python Backend ──────────────────────────────────────
  backend:
    build:
      context: ./admin/backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      QRCODE_SERVICE_URL: http://qrcode-service:5000
      UPLOAD_DIR: /data/uploads
      QRCODE_DIR: /data/qrcodes
      HOST_IP: ${HOST_IP:-localhost}
      PUBLIC_SITE_URL: http://${HOST_IP:-localhost}:5173
      ADMIN_BACKEND_URL: http://${HOST_IP:-localhost}:3001
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./admin/backend:/app
      - ./admin/uploads:/data/uploads
      - ./admin/qrcodes:/data/qrcodes

  # ── Python QR Code Microservice ──────────────────────────
  qrcode-service:
    build:
      context: ./admin/qrcode-service
    restart: unless-stopped
    ports:
      - "5001:5000"
    environment:
      QR_OUTPUT_DIR: /data/qrcodes
    volumes:
      - ./admin/qrcode-service:/app
      - ./admin/qrcodes:/data/qrcodes

  # ── Admin React Frontend ────────────────────────────────
  admin-frontend:
    build:
      context: ./admin/frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      REACT_APP_BACKEND_URL: http://${HOST_IP:-localhost}:3001
      HOST: 0.0.0.0
    depends_on:
      - backend
    volumes:
      - ./admin/frontend:/app
      - admin_frontend_node_modules:/app/node_modules

  # ── Client API (read-only Flask) ──────────────────────────
  client-api:
    build:
      context: ./client-api
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      CLIENT_URL: http://${HOST_IP:-localhost}:5173
    depends_on:
      db:
        condition: service_healthy

  # ── Client App (Vite) ───────────────────────────────────
  client:
    build:
      context: ./client
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://${HOST_IP:-localhost}:3002
    depends_on:
      - client-api
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules

volumes:
  pgdata:
  admin_frontend_node_modules:
  client_node_modules:
